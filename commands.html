<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Bot Commands</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --border-soft: #202020;
            --border-strong: #3a3a3a;
            --radius: 10px;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-weight: 300;
            color: var(--text-main);
            background: none !important;
            letter-spacing: 0.01em;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px 60px;
            box-sizing: border-box;
            position: relative;
            min-height: 100vh;
        }

        /* Starlight background gradient - monochrome */
        .body-starlight-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* Monochrome starlight gradient */
            background: 
                radial-gradient(ellipse 120% 70% at 60% 10%, rgba(80,80,80,0.12), rgba(120,120,120,0.08) 33%, rgba(60,60,60,0.10) 69%, rgba(0,0,0,0.70), rgba(0,0,0,0.95) 100%),
                #050505;
            filter: blur(0.8px) saturate(0);
        }

        /* Starfield main background (as in main site & loading) */
        .main-stars-bg {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg);
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .main-stars-bg canvas {
            width: 100vw !important;
            height: 100vh !important;
            display: block;
            opacity: 0.55;
            filter: blur(2.5px) brightness(1.08);
            pointer-events: none;
        }

        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.25s ease;
        }

        .loading-mark {
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .commands-page {
            width: 100%;
            max-width: 1100px;
            background: transparent;
            border-radius: var(--radius);
            padding: 80px 22px 28px;
            border: none;
            position: relative;
            z-index: 2;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .page-header-main {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-header-logo {
            width: 32px;
            height: 32px;
            filter: grayscale(1) brightness(1.2);
        }

        .page-title {
            font-size: 2rem;
            font-weight: 200;
            letter-spacing: -0.02em;
            margin: 0;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 300;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-link:hover,
        .back-link:focus {
            color: var(--text-main);
        }

        .commands-header {
            margin: 10px 0 18px;
            color: var(--text-muted);
            font-size: 0.92rem;
            font-weight: 300;
        }

        .commands-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            margin-bottom: 12px;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 4px 0 4px 24px;
        }

        .search-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 300;
            width: 190px;
            letter-spacing: 0.01em;
        }

        .search-icon {
            position: absolute;
            left: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .search-clear {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-left: 8px;
            opacity: 0.0;
            pointer-events: none;
            transition: opacity .18s;
        }

        .search-clear.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .command-count {
            margin: 6px 0 12px;
            font-size: 0.9rem;
            font-weight: 300;
            color: var(--text-muted);
        }

        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 12px;
        }

        .command-card {
            background: rgba(22,22,22,0.35);
            border-radius: var(--radius);
            padding: 12px 14px 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.08);
            color: #dee0e5;
            filter: grayscale(1);
        }
        .command-card:hover {
            background: rgba(22,22,22,0.5);
            border-color: rgba(255,255,255,0.15);
        }
        .command-card:hover,
        .command-card:focus-visible {
            background: rgba(32,32,32,0.61);
            border-color: #333338;
            color: #fafcff;
            box-shadow: 0 4px 28px 0 rgba(30,30,30,0.19);
        }

        .command-category-pill {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #acacb6;
            background: rgba(40,40,40,0.35);
            margin-bottom: 4px;
            filter: grayscale(1) brightness(0.95) contrast(0.93);
        }

        .command-name {
            font-size: 1.05rem;
            font-weight: 300;
            color: #e5e5e5 !important;
            margin-bottom: 2px;
            filter: grayscale(1);
            letter-spacing: 0.01em;
        }

        .command-details-modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .command-details-modal {
            width: 100%;
            max-width: 420px;
            background: rgba(16,17,25,0.93);
            border-radius: var(--radius);
            padding: 18px 18px 16px;
            border: 1px solid var(--border-soft);
            position: relative;
            /* modal: more opaque for readability, still keep subtle transparency */
            box-shadow: 0 7px 44px 2px #000b;
            filter: grayscale(1);
            color: #f2f2f3;
        }

        .cmd-close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            border: none;
            background: transparent;
            color: #b0b1b5;
            cursor: pointer;
        }

        .cmd-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .cmd-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f7f7f7;
            filter: grayscale(1);
        }

        .cmd-copy-btn {
            border: none;
            background: #232430;
            color: #e7e7e7;
            border-radius: 999px;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            filter: grayscale(1);
        }

        .cmd-desc {
            font-size: 0.96rem;
            color: #b3b3b3;
            margin-bottom: 10px;
            filter: grayscale(1);
        }

        .cmd-section {
            margin-bottom: 6px;
        }

        .cmd-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #b3b3b3;
            margin-bottom: 2px;
            filter: grayscale(1);
        }

        .cmd-value {
            font-size: 0.96rem;
            color: #fff;
            filter: grayscale(1);
        }

        @media (max-width: 720px) {
            body {
                padding: 24px 10px 32px;
            }

            .commands-page {
                padding: 20px 14px 22px;
            }
        }

        /* Custom Modern Select Styles */
        .filter-group {
            display: flex;
            align-items: center;
        }
        .category-filter {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background: rgba(24,24,28,0.6);
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.08);
            outline: none;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 300;
            padding: 0.6em 2em 0.6em 1.25em;
            border-radius: 1.1em;
            margin-right: 8px;
            transition: all 0.2s ease;
            position: relative;
            cursor: pointer;
            filter: grayscale(1);
            letter-spacing: 0.01em;
        }
        .category-filter:hover, .category-filter:focus {
            border-color: var(--border-strong);
            background: #22222a;
        }
        /* Hide default dropdown arrow, add custom */
        .category-filter {
            background-image:
                url('data:image/svg+xml;utf8,<svg fill="gray" height="20" viewBox="0 0 20 20" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M6 8l4 4 4-4" stroke="%23999999" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>');
            background-repeat: no-repeat, no-repeat;
            background-position: right 1em center, right 1em center;
            background-size: 1.1em, 1.1em;
        }
        .category-filter:focus {
            outline: none;
        }
        .category-filter:-moz-focusring {
            color: #e7e9f0;
            text-shadow: none;
        }
        .category-filter option {
            background: #18181c !important;
            color: #cdcdcf;
            border-radius: 0 !important;
            padding: 0.7em 1.2em !important;
            font-size: 1rem;
            filter: grayscale(1);
        }
        .category-filter option:checked,
        .category-filter option:focus,
        .category-filter option:hover {
            background: #2a2b31 !important;
            color: #fff !important;
        }
        .category-filter:focus-visible {
            outline: none;
            border-color: var(--border-strong);
        }
        .category-filter::-ms-expand {
            display: none;
        }

        .clear-filters {
            border-radius: 100px;
            padding: 0.5em 1.3em;
            background: transparent;
            color: #979797;
            border: 1px solid rgba(255,255,255,0.08);
            outline: none;
            margin-left: 4px;
            transition: all 0.2s ease;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 300;
            opacity: .88;
            filter: grayscale(1);
        }
        .clear-filters:enabled:hover, .clear-filters:enabled:focus {
            background: #191a21;
            color: #fafbfd;
            opacity: 1;
        }
        .clear-filters:disabled {
            opacity: 0.55;
            cursor: default;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .commands-page {
            animation: fadeInUp 0.8s 0.15s both;
        }

        .page-header {
            animation: slideDown 0.6s 0.1s both;
        }

        .command-card {
            animation: scaleIn 0.5s both;
        }

        /* Top navigation bar */
        .site-bar {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: min(1100px, calc(100% - 32px));
            padding: 10px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }

        .site-bar-inner {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 12, 0.92);
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.06);
            padding: 8px 18px;
            -webkit-backdrop-filter: blur(18px);
            backdrop-filter: blur(18px);
        }

        .site-bar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .site-bar-logo {
            width: 26px;
            height: 26px;
            border-radius: 8px;
            object-fit: cover;
            filter: grayscale(1) brightness(1.15);
        }

        .site-bar-name {
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .site-bar-nav {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .site-bar-link {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-muted);
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 999px;
            transition: color 0.18s ease, background-color 0.18s ease;
        }

        .site-bar-link:hover,
        .site-bar-link:focus-visible {
            color: var(--text-main);
            background: rgba(255,255,255,0.06);
        }

        .site-bar-link.is-active {
            color: var(--text-main);
            background: rgba(255,255,255,0.10);
        }
    </style>

    <script>
        // Starfield background canvas logic (from index.html)
        function drawStars(canvas, count) {
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < count; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const r = 0.6 + Math.random() * 0.85;
                const alpha = 0.7 + Math.random()*0.26;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, 2 * Math.PI, false);
                ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                ctx.shadowColor = "#fff";
                ctx.shadowBlur = 2 + Math.random()*8;
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }
        function setupMainStarsBg() {
            const starsBg = document.getElementById('mainStarsBg');
            if (!starsBg) return;
            if (!starsBg.querySelector('canvas')) {
                const canvas = document.createElement('canvas');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                starsBg.appendChild(canvas);
            }
            const canvas = starsBg.querySelector('canvas');
            drawStars(canvas, Math.floor(56 + Math.random()*24));
        }

        window.addEventListener('resize', function(){
            var starsBg = document.getElementById('mainStarsBg');
            var canvas = starsBg && starsBg.querySelector('canvas');
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                drawStars(canvas, Math.floor(56 + Math.random()*24));
            }
        });

        if (document.readyState !== 'loading') {
            setupMainStarsBg();
        } else {
            document.addEventListener('DOMContentLoaded', function(){
                setupMainStarsBg();
            });
        }

        // Loading overlay
        window.addEventListener('load', function () {
            const loading = document.getElementById('loadingScreen');
            if (!loading) return;
            loading.style.opacity = '0';
            setTimeout(function () {
                loading.style.display = 'none';
            }, 260);
        });

        // This list is extracted and updated to reflect the ACTUAL contents of the "Commands" folder.
        // Make sure this matches the commands that you have in C:\Users\n3632\Downloads\loop commands\Commands.

        ];
        commandFiles.sort((a, b) => a.localeCompare(b));

        // Map commands to rough categories by name pattern
        function guessCategory(name) {
            const n = name.toLowerCase();
            if ([
                'ban','hardban','unban','mute','imute','rmute','runmute','iunmute',
                'jail','unjail','lock','unlock','nuke','antinuke','antiraid',
                'filter','restrictcommand','blacklist','ignore','timeout'
            ].includes(n)) return 'moderation';

            if ([
                'balance','bet','blackjack','leaderboard','give','withdraw',
                'steal','remind','giveaways','boosts'
            ].includes(n)) return 'economy';

            if ([
                'serverinfo','userinfo','avatar','avatarhistory','inviteinfo',
                'timezone','seen','history','topcommands','transferhistory','hex','ping','editsnipe','snipe','reactionsnipe'
            ].includes(n)) return 'utility';

            if ([
                'hug','kiss','slap','love','laugh','juul','roleplay','headbang',
                'handhold','smile','mad','happy','evillaugh','nuzzle','nom','nervous','lick','facepalm'
            ].includes(n)) return 'fun';

            if ([
                'settings','setup','autorole','welcome','goodbye','ticket',
                'reactionrole','buttonrole','voicemaster','starboard','bumpreminder',
                'autoresponder','bots','whitelist','roles','role','roleall','rolehumans',
                'stickyrole','stickymessage','enablecommand','disablecommand','forcenickname','serveravatar','serverbanner','customize','embedcopy','webhook','createembed','config'
            ].includes(n)) return 'config';

            return 'other';
        }

        // Nice readable description for commands (key: description; update with your commands as needed)
        const commandDescriptions = {

        // Convert command files into objects with details, then sort alphabetically by name
        const commandsData = commandFiles.map(name => {
            const category = guessCategory(name);
            return {
                name,
                category,
                description: commandDescriptions[name] || ("No description yet."),
                arguments: commandArguments[name] || "none",
                permissions: commandPermissions[name] || "none"
            };
        });

        function initializeCommandsPage() {
            const commandsGrid = document.getElementById('commandsGrid');
            const commandCount = document.getElementById('commandCount');
            const searchInput = document.getElementById('commandSearch');
            const categoryFilter = document.getElementById('categoryFilter');
            const searchClear = document.getElementById('searchClear');
            const clearFilters = document.getElementById('clearFilters');
            const modalContainer = document.getElementById('commandDetailsModalContainer');

            let currentSearch = "";
            let currentCategory = "all";
            let currentCommands = [...commandsData];

            function updateClearButton() {
                const hasFilters = currentSearch.length > 0 || currentCategory !== 'all';
                clearFilters.disabled = !hasFilters;
                searchClear.classList.toggle('visible', currentSearch.length > 0);
            }

            function renderCommands() {
                commandsGrid.innerHTML = "";
                commandCount.textContent = `Showing ${currentCommands.length} command${currentCommands.length === 1 ? "" : "s"}`;
                if (currentCommands.length === 0) {
                    const noResults = document.createElement('div');
                    noResults.style.cssText = `
                        grid-column: 1 / -1;
                        text-align: center;
                        padding: 40px 20px;
                        color: rgba(255, 255, 255, 0.65);
                        filter: grayscale(1);
                    `;
                    noResults.innerHTML = `
                        <i class="fas fa-search" style="font-size: 2.4rem; margin-bottom: 14px; opacity: 0.35; filter: grayscale(1);"></i>
                        <div>No commands match your search.</div>
                    `;
                    commandsGrid.appendChild(noResults);
                    return;
                }

                // Sort currentCommands alphabetically before rendering
                const sortedCommands = [...currentCommands].sort((a, b) => a.name.localeCompare(b.name));

                sortedCommands.forEach(cmd => {
                    const card = document.createElement('div');
                    card.className = 'command-card';
                    card.dataset.category = cmd.category;
                    card.innerHTML = `
                        <div class="command-category-pill">${cmd.category}</div>
                        <div class="command-name">${cmd.name}</div>
                    `;
                    card.addEventListener('click', () => showCommandModal(cmd));
                    commandsGrid.appendChild(card);
                });
            }

            function applyFilters() {
                currentSearch = searchInput.value.toLowerCase().trim();
                currentCategory = categoryFilter.value;

                currentCommands = commandsData.filter(cmd => {
                    const matchesText =
                        cmd.name.toLowerCase().includes(currentSearch) ||
                        (cmd.description && cmd.description.toLowerCase().includes(currentSearch));
                    const matchesCategory =
                        currentCategory === 'all' || cmd.category === currentCategory;
                    return matchesText && matchesCategory;
                });

                updateClearButton();
                renderCommands();
            }

            function clearAllFilters() {
                searchInput.value = "";
                categoryFilter.value = "all";
                currentSearch = "";
                currentCategory = "all";
                applyFilters();
            }

            function clearSearch() {
                searchInput.value = "";
                currentSearch = "";
                applyFilters();
            }

            searchInput.addEventListener('input', applyFilters);
            categoryFilter.addEventListener('change', applyFilters);
            clearFilters.addEventListener('click', clearAllFilters);
            searchClear.addEventListener('click', clearSearch);

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    clearSearch();
                }
            });

            // Animate dropdown when it opens on click (force add .open)
            categoryFilter.addEventListener('mousedown', function() {
                categoryFilter.classList.add('open');
                setTimeout(() => categoryFilter.classList.remove('open'), 400);
            });

            // Modal rendering
            let modalOpen = false;
            function showCommandModal(cmd) {
                // Remove previous modal if present
                modalContainer.innerHTML = '';

                const argVal = cmd.arguments;
                const permVal = cmd.permissions;
                const cmdTextToCopy = `/${cmd.name}`;

                const modalBg = document.createElement('div');
                modalBg.className = 'command-details-modal-bg';
                modalBg.tabIndex = -1;

                const modal = document.createElement('div');
                modal.className = 'command-details-modal';

                modal.innerHTML = `
                    <button class="cmd-close-btn" title="Close (Esc)"><i class="fas fa-times"></i></button>
                    <div class="cmd-title-row">
                        <span class="cmd-title">${cmd.name}</span>
                        <button class="cmd-copy-btn" id="cmdCopyBtn" title="Copy command">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                    <div class="cmd-desc">${cmd.description}</div>
                    <div class="cmd-section">
                        <div class="cmd-label">Arguments</div>
                        <span class="cmd-value">${argVal}</span>
                    </div>
                    <div class="cmd-section">
                        <div class="cmd-label">Permissions</div>
                        <span class="cmd-value">${permVal}</span>
                    </div>
                `;
                modalBg.appendChild(modal);

                // Effects
                function doModalClose() {
                    if (!modalOpen) return;
                    modalOpen = false;
                    modalBg.remove();
                    window.removeEventListener('keydown', modalKeyHandler);
                }
                function modalKeyHandler(e) {
                    if (e.key === "Escape") {
                        doModalClose();
                    }
                }

                modal.querySelector('.cmd-close-btn').onclick = doModalClose;
                modalBg.onclick = function(e) {
                    if (e.target === modalBg) doModalClose();
                };
                window.addEventListener('keydown', modalKeyHandler);

                modal.querySelector('#cmdCopyBtn').onclick = function() {
                    navigator.clipboard.writeText(cmdTextToCopy).then(() => {
                        const btn = modal.querySelector('#cmdCopyBtn');
                        btn.innerHTML = '<i class="fas fa-check"></i>';
                        btn.title = "Copied!";
                        setTimeout(() => {
                            btn.innerHTML = '<i class="fas fa-copy"></i>';
                            btn.title = "Copy command";
                        }, 1200);
                    });
                };

                modalContainer.appendChild(modalBg);
                modalOpen = true;
            }

            applyFilters();
        }

        window.addEventListener('DOMContentLoaded', initializeCommandsPage);
    </script>
