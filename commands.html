<!DOCTYPE html>
<html lang="en">

    <style>
        /* ... your existing styles ... */

        /* Custom Modern Select Styles */
        .filter-group {
            display: flex;
            align-items: center;
        }
        .category-filter {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background: linear-gradient(135deg, #242630 80%, #23242a 100%);
            color: #e7e9f0;
            border: none;
            outline: none;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.6em 2em 0.6em 1.25em;
            border-radius: 1.1em;
            margin-right: 8px;
            box-shadow: 0 2px 8px 0 rgba(24,28,37,0.1), 0 1.5px 0.5px 0 rgba(44,44,59,0.05);
            transition: box-shadow 0.17s, background 0.18s;
            position: relative;
            cursor: pointer;
        }
        .category-filter:hover, .category-filter:focus {
            box-shadow: 0 3px 16px 0 rgba(24,28,37,0.16), 0 1.5px 0.6px 0 rgba(44,44,59,0.08);
            background: linear-gradient(135deg, #282a36 80%, #292a31 100%);
        }
        /* Hide default dropdown arrow, add custom */
        .category-filter {
            background-image:
                linear-gradient(135deg, #242630 80%, #23242a 100%),
                url('data:image/svg+xml;utf8,<svg fill="gray" height="20" viewBox="0 0 20 20" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M6 8l4 4 4-4" stroke="%239C9DB4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>');
            background-repeat: no-repeat, no-repeat;
            background-position: right 1em center, right 1em center;
            background-size: 1.1em, 1.1em;
        }
        .category-filter:focus {
            outline: none;
        }
        /* Remove outline ring in Firefox */
        .category-filter:-moz-focusring {
            color: #e7e9f0;
            text-shadow: none;
        }

        /* Custom option styling using select pseudo-classes (limited support but works in WebKit, Chrome, Edge, modern Firefox) */
        .category-filter option {
            background: #20222b !important;
            color: #e1e2ed;
            border-radius: 0 !important;
            padding: 0.7em 1.2em !important;
            font-size: 1rem;
            font-family: 'Space Grotesk', sans-serif;
            transition: background 0.14s, color 0.13s;
        }
        /* Remove ugly blue highlight & use modern background (not supported in all browsers but works in Chromium and FF ≥ 110) */
        .category-filter option:checked,
        .category-filter option:focus,
        .category-filter option:hover {
            background: #353746 !important;
            color: #fff !important;
        }

        /* Remove blue highlight when dropdown is opened (for Chrome) */
        .category-filter:focus-visible {
            outline: none;
            box-shadow: 0 2px 16px 0 rgba(36,38,55,.15), 0 1.5px 0.5px 0 rgba(30,30,44,0.09);
        }

        /* extra: increase clickable area for ease, look more modern */
        .category-filter::-ms-expand {
            display: none;
        }

        /* --- End custom select style additions --- */

        /* (Optionally, .clear-filters styling can stay unchanged or also be refined for roundness) */
        .clear-filters {
            border-radius: 100px;
            padding: 0.5em 1.3em;
            background: #20222a;
            color: #babacd;
            border: none;
            outline: none;
            margin-left: 4px;
            transition: background 0.17s, color .14s;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            opacity: .88;
        }
        .clear-filters:enabled:hover,.clear-filters:enabled:focus {
            background: #282837;
            color: #fff;
            opacity: 1;
        }
        .clear-filters:disabled {
            opacity: 0.55;
            cursor: default;
        }
    </style>
</head>
<body>
    <div class="commands-page">
        <div class="page-header">
            <h1 class="page-title">Loop Commands</h1>
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to main page
            </a>
        </div>

        <div class="commands-header">
            <p>Searchable list of Loop’s commands based on the bot’s command files.</p>
        </div>

        <div class="commands-controls">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Search commands..." id="commandSearch">
                <i class="fas fa-times search-clear" id="searchClear"></i>
            </div>
            <div class="filter-group">
                <select class="category-filter" id="categoryFilter" title="Filter commands by category">
                    <option value="all">All types</option>
                    <option value="moderation">Moderation</option>
                    <option value="economy">Economy</option>
                    <option value="utility">Utility</option>
                    <option value="fun">Fun / RP</option>
                    <option value="config">Config / Setup</option>
                    <option value="other">Other</option>
                </select>
                <button class="clear-filters" id="clearFilters" disabled>
                    <i class="fas fa-times"></i>
                    Clear
                </button>
            </div>
        </div>

        <div class="command-count" id="commandCount">Showing 0 commands</div>

        <div class="commands-grid" id="commandsGrid"></div>
    </div>

        // Map commands to rough categories by name pattern
        function guessCategory(name) {
            const n = name.toLowerCase();
            if ([
                'ban','hardban','unban','mute','imute','rmute','runmute','iunmute',
                'jail','unjail','lock','unlock','nuke','antinuke','antiraid',
                'filter','restrictcommand','blacklist','ignore','timeout'
            ].includes(n)) return 'moderation';

            if ([
                'balance','bet','blackjack','leaderboard','give','withdraw',
                'steal','remind','giveaways','boosts'
            ].includes(n)) return 'economy';

            if ([
                'serverinfo','userinfo','avatar','avatarhistory','inviteinfo',
                'timezone','seen','history','topcommands','transferhistory','hex','ping','editsnipe','snipe','reactionsnipe'
            ].includes(n)) return 'utility';

            if ([
                'hug','kiss','slap','love','laugh','juul','roleplay','headbang',
                'handhold','smile','mad','happy','evillaugh','nuzzle','nom','nervous','lick','facepalm'
            ].includes(n)) return 'fun';

            if ([
                'settings','setup','autorole','welcome','goodbye','ticket',
                'reactionrole','buttonrole','voicemaster','starboard','bumpreminder',
                'autoresponder','bots','whitelist','roles','role','roleall','rolehumans',
                'stickyrole','stickymessage','enablecommand','disablecommand','forcenickname','serveravatar','serverbanner','customize','embedcopy','webhook','createembed','config'
            ].includes(n)) return 'config';

            return 'other';
        }

        // Nice readable description for commands (key: description; update with your commands as needed)

            "withdraw": "Withdraw currency from your account."

        // Arguments and Permissions stub for example/known commands
        const commandArguments = {
            "ban": "<user> [reason]",
            "mute": "<user> [duration]",
            "unban": "<user>",
            "kick": "<user> [reason]",
            "userinfo": "[user]",
            "serverinfo": "none",
            "balance": "none",
            "give": "<user> <amount>",
            "avatar": "[user]",
            "ping": "none",
            "jail": "<user> [duration]",
            "hug": "[user]",
            "slap": "<user>",

            "help": "[command]",
            "lock": "[channel]",
            "unlock": "[channel]",
            "inviteinfo": "[invite]",
            "settings": "[option]",
            "withdraw": "<amount>",
            "remind": "<time> <reminder>",
            "giveaways": "[start/end/list]",
            "reactionrole": "<role> <emoji>",
            "setup": "none",
            "autorole": "<role>",
            "role": "<user> <role>",
            "tickets": "[open/close]",
            "balance": "none",
            "leaderboard": "none"
            // ...You can add more argument help as needed.
        };
        const commandPermissions = {
            "ban": "Ban Members",
            "mute": "Mute Members",
            "unban": "Ban Members",
            "kick": "Kick Members",
            "userinfo": "none",
            "serverinfo": "none",
            "balance": "none",
            "give": "none",
            "avatar": "none",
            "ping": "none",
            "jail": "Manage Roles",
            "hug": "none",
            "slap": "none",

            "help": "none",
            "lock": "Manage Channels",
            "unlock": "Manage Channels",
            "inviteinfo": "none",
            "settings": "Manage Server",
            "withdraw": "none",
            "remind": "none",
            "giveaways": "Manage Guild",
            "reactionrole": "Manage Roles",
            "setup": "Manage Server",
            "autorole": "Manage Roles",
            "role": "Manage Roles",
            "ticket": "Manage Channels",
            "leaderboard": "none"
            // ...You can add more as needed.
        };

        // Convert command files into objects with details, then sort alphabetically by name
        const commandsData = commandFiles.map(name => {
            const category = guessCategory(name);
            return {
                name,
                category,
                description: commandDescriptions[name] || ("No description yet."),
                arguments: commandArguments[name] || "none",
                permissions: commandPermissions[name] || "none"
            };
        });
        // It is already sorted because commandFiles is sorted above. If externally sorting for safety, uncomment below:
        //commandsData.sort((a, b) => a.name.localeCompare(b.name));

        function initializeCommandsPage() {
            const commandsGrid = document.getElementById('commandsGrid');
            const commandCount = document.getElementById('commandCount');
            const searchInput = document.getElementById('commandSearch');
            const categoryFilter = document.getElementById('categoryFilter');
            const searchClear = document.getElementById('searchClear');
            const clearFilters = document.getElementById('clearFilters');
            const modalContainer = document.getElementById('commandDetailsModalContainer');

            let currentSearch = "";
            let currentCategory = "all";
            let currentCommands = [...commandsData];

            function updateClearButton() {
                const hasFilters = currentSearch.length > 0 || currentCategory !== 'all';
                clearFilters.disabled = !hasFilters;
                searchClear.classList.toggle('visible', currentSearch.length > 0);
            }

            function renderCommands() {
                commandsGrid.innerHTML = "";
                commandCount.textContent = `Showing ${currentCommands.length} command${currentCommands.length === 1 ? "" : "s"}`;
                if (currentCommands.length === 0) {
                    const noResults = document.createElement('div');
                    noResults.style.cssText = `
                        grid-column: 1 / -1;
                        text-align: center;
                        padding: 40px 20px;
                        color: rgba(255, 255, 255, 0.65);
                    `;
                    noResults.innerHTML = `
                        <i class="fas fa-search" style="font-size: 2.4rem; margin-bottom: 14px; opacity: 0.35;"></i>
                        <div>No commands match your search.</div>
                    `;
                    commandsGrid.appendChild(noResults);
                    return;
                }

                // Sort currentCommands alphabetically before rendering
                const sortedCommands = [...currentCommands].sort((a, b) => a.name.localeCompare(b.name));

                sortedCommands.forEach(cmd => {
                    const card = document.createElement('div');
                    card.className = 'command-card';
                    card.dataset.category = cmd.category;
                    card.innerHTML = `
                        <div class="command-category-pill">${cmd.category}</div>
                        <div class="command-name" style="font-size:1.14rem;font-weight:600;color:#eee;margin-bottom:2px;">${cmd.name}</div>
                    `;
                    card.addEventListener('click', () => showCommandModal(cmd));
                    commandsGrid.appendChild(card);
                });
            }

            function applyFilters() {
                currentSearch = searchInput.value.toLowerCase().trim();
                currentCategory = categoryFilter.value;

                currentCommands = commandsData.filter(cmd => {
                    const matchesText =
                        cmd.name.toLowerCase().includes(currentSearch) ||
                        (cmd.description && cmd.description.toLowerCase().includes(currentSearch));
                    const matchesCategory =
                        currentCategory === 'all' || cmd.category === currentCategory;
                    return matchesText && matchesCategory;
                });

                updateClearButton();
                renderCommands();
            }

            function clearAllFilters() {
                searchInput.value = "";
                categoryFilter.value = "all";
                currentSearch = "";
                currentCategory = "all";
                applyFilters();
            }

            function clearSearch() {
                searchInput.value = "";
                currentSearch = "";
                applyFilters();
            }

            searchInput.addEventListener('input', applyFilters);
            categoryFilter.addEventListener('change', applyFilters);
            clearFilters.addEventListener('click', clearAllFilters);
            searchClear.addEventListener('click', clearSearch);

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    clearSearch();
                }
            });

            // Animate dropdown when it opens on click (force add .open)
            categoryFilter.addEventListener('mousedown', function() {
                categoryFilter.classList.add('open');
                setTimeout(() => categoryFilter.classList.remove('open'), 400);
            });

            // Modal rendering
            let modalOpen = false;
            function showCommandModal(cmd) {
                // Remove previous modal if present
                modalContainer.innerHTML = '';

                const argVal = cmd.arguments;
                const permVal = cmd.permissions;

                // Real command name for copying
                const cmdTextToCopy = `/${cmd.name}`;

                const modalBg = document.createElement('div');
                modalBg.className = 'command-details-modal-bg';
                modalBg.tabIndex = -1;

                const modal = document.createElement('div');
                modal.className = 'command-details-modal';

                modal.innerHTML = `
                    <button class="cmd-close-btn" title="Close (Esc)"><i class="fas fa-times"></i></button>
                    <div class="cmd-title-row">
                        <span class="cmd-title">${cmd.name}</span>
                        <button class="cmd-copy-btn" id="cmdCopyBtn" title="Copy command">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                    <div class="cmd-desc">${cmd.description}</div>
                    <div class="cmd-section">
                        <div class="cmd-label">Arguments</div>
                        <span class="cmd-value">${argVal}</span>
                    </div>
                    <div class="cmd-section">
                        <div class="cmd-label">Permissions</div>
                        <span class="cmd-value">${permVal}</span>
                    </div>
                `;
                modalBg.appendChild(modal);

                // Effects
                function doModalClose() {
                    if (!modalOpen) return;
                    modalOpen = false;
                    modalBg.remove();
                    window.removeEventListener('keydown', modalKeyHandler);
                }
                function modalKeyHandler(e) {
                    if (e.key === "Escape") {
                        doModalClose();
                    }
                }

                // Close handlers
                modal.querySelector('.cmd-close-btn').onclick = doModalClose;
                modalBg.onclick = function(e) {
                    if (e.target === modalBg) doModalClose();
                };
                window.addEventListener('keydown', modalKeyHandler);

                // Copy to clipboard
                modal.querySelector('#cmdCopyBtn').onclick = function() {
                    navigator.clipboard.writeText(cmdTextToCopy).then(() => {
                        const btn = modal.querySelector('#cmdCopyBtn');
                        btn.innerHTML = '<i class="fas fa-check"></i>';
                        btn.title = "Copied!";
                        setTimeout(() => {
                            btn.innerHTML = '<i class="fas fa-copy"></i>';
                            btn.title = "Copy command";
                        }, 1200);
                    });
                };

                modalContainer.appendChild(modalBg);
                modalOpen = true;
            }

            applyFilters();
        }

        window.addEventListener('DOMContentLoaded', initializeCommandsPage);
    </script>
</body>
</html>
