<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Bot Commands</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/commands.css">
<base target="_blank">
</head>
<body>
    <!-- Top navigation bar -->
    <header class="site-bar">
        <div class="site-bar-inner">
            <div class="site-bar-brand">
                <img src="assets/loop-logo.png" alt="Loop logo" class="site-bar-logo">
            </div>
            <nav class="site-bar-nav">
                <a href="commands.html" class="site-bar-link is-active">Commands</a>
                <a href="#support" class="site-bar-link">Support</a>
                <a href="#invite" class="site-bar-link">Invite</a>
            </nav>
        </div>
    </header>

    <!-- Monochrome starlight background -->
    <div class="body-starlight-bg" aria-hidden="true"></div>
    <div class="main-stars-bg" id="mainStarsBg"></div>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-mark">Loading Loop</div>
    </div>

    <div class="commands-page" id="commands">
        <div class="page-header">
            <div class="page-header-main">
                <img src="assets/loop-logo.png" alt="Loop logo" class="page-header-logo">
                <h1 class="page-title">Loop Commands</h1>
            </div>
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to main page
            </a>
        </div>

        <div class="commands-header">
            <p>Searchable list of Loop’s commands based on the bot’s command files.</p>
        </div>

        <div class="commands-controls">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Search commands..." id="commandSearch">
                <i class="fas fa-times search-clear" id="searchClear"></i>
            </div>
            <div class="filter-group">
                <select class="category-filter" id="categoryFilter" title="Filter commands by category">
                    <option value="all">All types</option>
                    <option value="moderation">Moderation</option>
                    <option value="economy">Economy</option>
                    <option value="utility">Utility</option>
                    <option value="fun">Fun / RP</option>
                    <option value="config">Config / Setup</option>
                    <option value="other">Other</option>
                </select>
                <button class="clear-filters" id="clearFilters" disabled>
                    <i class="fas fa-times"></i>
                    Clear
                </button>
            </div>
        </div>

        <div class="command-count" id="commandCount">Showing 0 commands</div>

        <div class="commands-grid" id="commandsGrid"></div>
    </div>

    <!-- Modal placeholder -->
    <div id="commandDetailsModalContainer"></div>

    <script src="js/shared.js"></script>
    <script src="js/commands.js"></script>
</body>
</html>
