<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Bot Commands</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/commands.css">
<base target="_blank">
</head>
<body>
    <!-- Top navigation bar -->
    <header class="site-bar">
        <div class="site-bar-inner">
            <div class="site-bar-brand">
                <a href="index.html"><img src="assets/loop-logo.png" alt="Loop logo" class="site-bar-logo"></a>
            </div>
            <nav class="site-bar-nav">
    <a href="commands.html" class="site-bar-link is-active" target="_self">Commands</a>
    <a href="status.html" class="site-bar-link" target="_self">Status</a>
    <a href="docs.html" class="site-bar-link" target="_self">Docs</a>
    <a href="faq.html" class="site-bar-link" target="_self">FAQ</a>
</nav>
        </div>
    </header>

    <!-- Monochrome starlight background -->
    <div class="body-starlight-bg" aria-hidden="true"></div>
    <div class="main-stars-bg" id="mainStarsBg"></div>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-mark">Loading Loop</div>
    </div>

    <div class="commands-page" id="commands">
        <div class="page-header">
            <div class="page-header-main">
                <img src="assets/loop-logo.png" alt="Loop logo" class="page-header-logo">
                <h1 class="page-title">Loop Commands</h1>
            </div>
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to main page
            </a>
        </div>

        <div class="commands-header">
            <p>Searchable list of Loop’s commands based on the bot’s command files.</p>
        </div>

        <div class="tabs-and-search-container">
            <div class="tab-navigation" id="tabNavigation">
    <button class="tab-nav-arrow" id="tabPrev">&lt;</button>
    <div class="tab-nav-scroll" id="tabScroll"></div>
    <button class="tab-nav-arrow" id="tabNext">&gt;</button>
</div>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search commands..." id="commandSearch">
                <i class="fas fa-search search-icon"></i>
            </div>
        </div>

        <div class="command-count" id="commandCount">Showing 0 commands</div>

        <div class="commands-grid" id="commandsGrid"></div>
    </div>

    <!-- Modal placeholder -->
    <div id="commandDetailsModalContainer"></div>

    <script src="js/shared.js"></script>
    <script src="js/commands.js"></script>
</body>
</html>
