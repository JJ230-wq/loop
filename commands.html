<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop Bot Commands</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
        }
        .commands-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .page-title {
            font-size: 2.5rem;
            font-weight: 300;
            background: linear-gradient(135deg, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .back-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }
        .back-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.12);
        }

        .commands-header {
            text-align: left;
            margin-bottom: 30px;
        }
        .commands-header p {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
        }

        .commands-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }
        .clear-filters {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .clear-filters:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .clear-filters:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 400px;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px 12px 45px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1);
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .search-clear {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        .search-clear.visible {
            opacity: 1;
            pointer-events: all;
        }
        .search-clear:hover {
            color: #fff;
        }
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.1rem;
        }

        /* --- ANIMATED FILTER DROPDOWN --- */
        .filter-group {
            position: relative; /* set up for dropdown shadow/highlight layer */
        }

        .category-filter {
            position: relative;
            padding: 12px 20px;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.16), rgba(255,255,255,0.02));
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px !important;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 300;
            cursor: pointer;
            min-width: 170px;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6,9 12,15 18,9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 14px;
            padding-right: 42px;
            box-shadow: 0 0 0 0 rgba(255,255,255,0.18);
            transition:
                border-color 0.25s,
                background 0.4s cubic-bezier(.6,0,.7,1.1),
                box-shadow 0.3s cubic-bezier(.66,.35,.47,.92),
                transform 0.18s,
                outline 0.25s;
            outline: none;
            z-index: 1;
        }
        .category-filter:focus,
        .category-filter.open {
            border-color: rgba(200, 200, 200, 0.38);
            background: radial-gradient(circle at top left, rgba(224,224,224,0.24), rgba(255,255,255,0.10));
            box-shadow:
                0 4px 24px 0 rgba(180,180,180,0.09),
                0 0 0 4px rgba(224,224,224,0.23);
            animation: filterHighlightFade 0.35s cubic-bezier(.79,.01,.42,.97);
            outline: none;
        }

        .category-filter:hover {
            background: radial-gradient(circle at top left, rgba(224,224,224,0.16), rgba(255,255,255,0.03));
            border-color: rgba(255, 255, 255, 0.30);
            transform: translateY(-1.5px) scale(1.0125);
            box-shadow: 0 6px 18px rgba(200, 200, 200, 0.10);
            transition: 
                border-color 0.23s, 
                background 0.32s cubic-bezier(.64,.27,.77,.63), 
                box-shadow 0.32s cubic-bezier(.41,.91,.79,.95), 
                transform 0.19s;
        }
        .category-filter option {
            background: #1a1a1a;
            color: #fff;
            border-radius: 13px;
        }
        @keyframes filterHighlightFade {
            from {
                background: radial-gradient(circle at top left, rgba(224,224,224,0.00), rgba(255,255,255,0.00));
                box-shadow: 0 0 0 0 rgba(224,224,224,0);
            }
            to {
                background: radial-gradient(circle at top left, rgba(224,224,224,0.24), rgba(255,255,255,0.10));
                box-shadow:
                    0 4px 24px 0 rgba(180,180,180,0.09),
                    0 0 0 4px rgba(224,224,224,0.23);
            }
        }
        select.category-filter:focus::-ms-value {
            background: rgba(224,224,224,0.22);
            color: #222;
            border-radius: 14px;
        }
        select.category-filter:focus-visible {
            outline: none;
            box-shadow: none;
        }
        select.category-filter:focus:not(:hover),
        select.category-filter:active:not(:hover) {
            animation: filterHighlightFade 0.38s cubic-bezier(.79,.01,.42,.97);
        }
        .category-filter:not(:focus):not(:hover) {
            transition: background 0.32s cubic-bezier(.64,.27,.77,.63);
        }

        .command-count {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        /* --- Command Card for List View --- */
        .command-card {
            background: rgba(255, 255, 255, 0.005);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            padding: 18px 16px;
            transition: all 0.2s ease;
            position: relative;
            cursor: pointer;
        }
        .command-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        .command-card.open {
            /* Visually distinguish the selected/open card */
            background: rgba(216, 216, 216, 0.08);
            border-color: rgba(224,224,224,0.18);
            box-shadow: 0 2px 18px 0 rgba(255,255,255,0.07);
            z-index: 10;
        }
        .command-category-pill {
            position: absolute;
            top: 10px;
            right: 12px;
            padding: 3px 8px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.24);
            font-size: 0.7rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8);
        }

        /* --- Command Details Modal --- */
        .command-details-modal-bg {
            position: fixed;
            inset: 0;
            z-index: 1999;
            background: rgba(0,0,0,0.61);
            animation: fadeInModalBg 0.22s cubic-bezier(.74,.22,.61,1.08);
        }
        @keyframes fadeInModalBg {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .command-details-modal {
            position: fixed;
            left: 50%; top: 50%;
            transform: translate(-50%, -55%) scale(1);
            background: rgba(30, 30, 30, 1);
            border-radius: 20px;
            padding: 42px 28px 30px 28px;
            width: 97vw;
            max-width: 410px;
            box-shadow: 0 12px 48px 0 rgba(0,0,32,.31), 0 0px 0px 2px #222;
            z-index: 2000;
            animation: fadeInModal 0.23s cubic-bezier(.45,.65,.56,1.11);
        }
        @keyframes fadeInModal {
            from { opacity: 0; transform: translate(-50%, -55%) scale(0.91);}
            to { opacity: 1; transform: translate(-50%, -55%) scale(1);}
        }
        .cmd-title-row {
            display: flex;
            align-items: center;
            gap: 11px;
            margin-bottom: 4px;
        }
        .cmd-title {
            font-size: 1.47rem;
            font-weight: 600;
            color: #f8f8f8;
            letter-spacing: 0.01em;
            word-break: break-all;
        }
        .cmd-copy-btn {
            outline: none;
            border: none;
            background: none;
            color: #b4b4b4;
            border-radius: 9px;
            font-size: 1.08rem;
            padding: 3.2px 7px 3.2px 6px;
            cursor: pointer;
            transition: background 0.13s, color 0.17s;
            margin-left: 1.5px;
            display: flex;
            align-items: center;
        }
        .cmd-copy-btn:active,
        .cmd-copy-btn:focus,
        .cmd-copy-btn:hover {
            color: #313131;
            background: #e0e0e0;
        }
        .cmd-desc {
            color: #ededed;
            margin-bottom: 17px;
            font-size: 1.04rem;
        }
        .cmd-label {
            font-size: 0.88rem;
            color: #a2a2a2;
            margin-bottom: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .cmd-section {
            margin-bottom: 13px;
        }
        .cmd-value {
            color: #f8f8f8;
            font-size: 1.09rem;
            border-radius: 10px;
            background: #19191a;
            display: inline-block;
            padding: 6.5px 13px;
            margin-left: 4px;
            font-family: inherit;
            font-weight: 400;
        }
        .cmd-close-btn {
            position: absolute;
            top: 17px;
            right: 17px;
            background: none;
            border: none;
            color: #bebebe;
            font-size: 1.22rem;
            border-radius: 50%;
            padding: 5px 7px;
            cursor: pointer;
            transition: background 0.19s, color 0.15s;
        }
        .cmd-close-btn:hover {
            background: #2e2e2e;
            color: #fff;
        }

        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .commands-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .search-container {
                max-width: none;
            }
            .command-details-modal {
                padding: 27px 8vw 20px 8vw;
                max-width: 97vw;
            }
        }
        @media (max-width: 520px) {
            .commands-page {
                padding: 28px 14px 56px;
            }
            .page-title {
                font-size: 2rem;
            }
            .commands-controls {
                gap: 14px;
            }
            .category-filter {
                width: 100%;
            }
            .filter-group {
                width: 100%;
                justify-content: space-between;
            }
            .clear-filters {
                padding-inline: 10px;
            }
            .commands-grid {
                grid-template-columns: 1fr;
            }
            .command-details-modal {
                padding: 20px 2vw 13px 2vw;
            }
        }
    </style>
</head>
<body>
    <div class="commands-page">
        <div class="page-header">
            <h1 class="page-title">Loop Commands</h1>
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to main page
            </a>
        </div>

        <div class="commands-header">
            <p>Searchable list of Loop’s commands based on the bot’s command files.</p>
        </div>

        <div class="commands-controls">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Search commands..." id="commandSearch">
                <i class="fas fa-times search-clear" id="searchClear"></i>
            </div>
            <div class="filter-group">
                <select class="category-filter" id="categoryFilter" title="Filter commands by category">
                    <option value="all">All types</option>
                    <option value="moderation">Moderation</option>
                    <option value="economy">Economy</option>
                    <option value="utility">Utility</option>
                    <option value="fun">Fun / RP</option>
                    <option value="config">Config / Setup</option>
                    <option value="other">Other</option>
                </select>
                <button class="clear-filters" id="clearFilters" disabled>
                    <i class="fas fa-times"></i>
                    Clear
                </button>
            </div>
        </div>

        <div class="command-count" id="commandCount">Showing 0 commands</div>

        <div class="commands-grid" id="commandsGrid"></div>
    </div>

    <!-- Modal placeholder -->
    <div id="commandDetailsModalContainer"></div>

    <script>
        // Map commands to rough categories by name pattern
        function guessCategory(name) {
            const n = name.toLowerCase();
            if ([
                'ban','hardban','unban','mute','imute','rmute','runmute','iunmute',
                'jail','unjail','lock','unlock','nuke','antinuke','antiraid',
                'filter','restrictcommand','blacklist','ignore','timeout'
            ].includes(n)) return 'moderation';

            if ([
                'balance','bet','blackjack','leaderboard','give','withdraw',
                'steal','remind','giveaways','boosts'
            ].includes(n)) return 'economy';

            if ([
                'serverinfo','userinfo','avatar','avatarhistory','inviteinfo',
                'timezone','seen','history','topcommands','transferhistory'
            ].includes(n)) return 'utility';

            if ([
                'hug','kiss','slap','love','laugh','juul','roleplay','headbang',
                'handhold','smile','mad','happy','evillaugh','nuzzle','nom','nervous'
            ].includes(n)) return 'fun';

            if ([
                'settings','setup','autorole','welcome','goodbye','ticket',
                'reactionrole','buttonrole','voicemaster','starboard','bumpreminder',
                'autoresponder','bots','whitelist','roles','role','roleall','rolehumans',
                'stickyrole','stickymessage','enablecommand','disablecommand'
            ].includes(n)) return 'config';

            return 'other';
        }

        // Nice readable description for commands (put key:end user description)
        const commandDescriptions = {
            "prefix": "View guild prefix.",
            "ban": "Ban a user from the server.",
            "mute": "Mute a user in the server.",
            "unban": "Remove a ban from a user.",
            "kick": "Remove a user from the server.",
            "userinfo": "See information about a user.",
            "serverinfo": "Show server information.",
            "balance": "Check your balance.",
            "give": "Give currency to another user.",
            "avatar": "Display a user's avatar.",
            "ping": "Show the bot's latency.",
            "jail": "Temporarily restrict a member.",
            "hug": "Send a virtual hug.",
            "slap": "Slap another user (in fun!).",
            "nuke": "Clear the current channel.",
            "help": "Get help for commands.",
            "lock": "Lock a channel.",
            "unlock": "Unlock a channel.",
            "inviteinfo": "Show information about an invite.",
            "settings": "Display or set server settings.",
            // ...add more descriptions as needed
        };

        // Arguments and Permissions stub for example/known commands
        const commandArguments = {
            "prefix": "none",
            "ban": "<user> [reason]",
            "mute": "<user> [duration]",
            "unban": "<user>",
            "kick": "<user> [reason]",
            "userinfo": "[user]",
            "serverinfo": "none",
            "balance": "none",
            "give": "<user> <amount>",
            "avatar": "[user]",
            "ping": "none",
            "jail": "<user> [duration]",
            "hug": "[user]",
            "slap": "<user>",
            "nuke": "none",
            "help": "[command]",
            "lock": "[channel]",
            "unlock": "[channel]",
            "inviteinfo": "[invite]",
            "settings": "[option]",
            // ...add more as above
        };
        const commandPermissions = {
            "prefix": "none",
            "ban": "Ban Members",
            "mute": "Mute Members",
            "unban": "Ban Members",
            "kick": "Kick Members",
            "userinfo": "none",
            "serverinfo": "none",
            "balance": "none",
            "give": "none",
            "avatar": "none",
            "ping": "none",
            "jail": "Manage Roles",
            "hug": "none",
            "slap": "none",
            "nuke": "Manage Channels",
            "help": "none",
            "lock": "Manage Channels",
            "unlock": "Manage Channels",
            "inviteinfo": "none",
            "settings": "Manage Server",
            // ...add more as above
        };

        // List of command names derived from JS filenames.
        const commandFiles = [
            "voicemaster","history","steal","badge","antiraid","antinuke","jail","unjail","juul","leveling","timer","reactionrole","afkmentions","embedcopy","lastfm","fortniteshop","webhook","createembed","choose","roleicon","boosts","goodbye","welcome","hide","unhide","customize","serveravatar","tags","birthday","nuke","autoresponder","giveaways","seen","vanity","serverbanner","inrole","balance","remind","give","blackjack","topcommands","nsr","hex","imgonly","ticket","buttonrole","bet","roblox","leaderboard","snipe","booster","editsnipe","starboard","timezone","quote","hardban","ignore","restrictcommand","stickyrole","reaction","avatarhistory","serverinfo","reactionsnipe","inviteinfo","withdraw","ban","mute","setup","forcenickname","bots","filter","roles","alias","autorole","avatar","userinfo","whitelist","transferhistory","settings","role","stickymessage","lock","unlock","runmute","iunmute","imute","rmute","enablecommand","disablecommand","smile","slap","nuzzle","nom","nervous","roleall","rolehumans","roleplay","bumpreminder","mad","love","lick","laugh","kiss","hug","headbang","happy","handhold","facepalm","evillaugh"
        ];

        const commandsData = commandFiles.map(name => {
            const category = guessCategory(name);
            return {
                name,
                category,
                // If no description, fallback to generated text:
                description: commandDescriptions[name] || ("No description yet."),
                arguments: commandArguments[name] || "none",
                permissions: commandPermissions[name] || "none"
            };
        });

        function initializeCommandsPage() {
            const commandsGrid = document.getElementById('commandsGrid');
            const commandCount = document.getElementById('commandCount');
            const searchInput = document.getElementById('commandSearch');
            const categoryFilter = document.getElementById('categoryFilter');
            const searchClear = document.getElementById('searchClear');
            const clearFilters = document.getElementById('clearFilters');
            const modalContainer = document.getElementById('commandDetailsModalContainer');

            let currentSearch = "";
            let currentCategory = "all";
            let currentCommands = [...commandsData];

            function updateClearButton() {
                const hasFilters = currentSearch.length > 0 || currentCategory !== 'all';
                clearFilters.disabled = !hasFilters;
                searchClear.classList.toggle('visible', currentSearch.length > 0);
            }

            function renderCommands() {
                commandsGrid.innerHTML = "";
                commandCount.textContent = `Showing ${currentCommands.length} command${currentCommands.length === 1 ? "" : "s"}`;
                if (currentCommands.length === 0) {
                    const noResults = document.createElement('div');
                    noResults.style.cssText = `
                        grid-column: 1 / -1;
                        text-align: center;
                        padding: 40px 20px;
                        color: rgba(255, 255, 255, 0.65);
                    `;
                    noResults.innerHTML = `
                        <i class="fas fa-search" style="font-size: 2.4rem; margin-bottom: 14px; opacity: 0.35;"></i>
                        <div>No commands match your search.</div>
                    `;
                    commandsGrid.appendChild(noResults);
                    return;
                }

                currentCommands.forEach(cmd => {
                    const card = document.createElement('div');
                    card.className = 'command-card';
                    card.dataset.category = cmd.category;
                    card.innerHTML = `
                        <div class="command-category-pill">${cmd.category}</div>
                        <div class="command-name" style="font-size:1.14rem;font-weight:600;color:#eee;margin-bottom:2px;">${cmd.name}</div>
                    `;
                    card.addEventListener('click', () => showCommandModal(cmd));
                    commandsGrid.appendChild(card);
                });
            }

            function applyFilters() {
                currentSearch = searchInput.value.toLowerCase().trim();
                currentCategory = categoryFilter.value;

                currentCommands = commandsData.filter(cmd => {
                    const matchesText =
                        cmd.name.toLowerCase().includes(currentSearch);
                    const matchesCategory =
                        currentCategory === 'all' || cmd.category === currentCategory;
                    return matchesText && matchesCategory;
                });

                updateClearButton();
                renderCommands();
            }

            function clearAllFilters() {
                searchInput.value = "";
                categoryFilter.value = "all";
                currentSearch = "";
                currentCategory = "all";
                applyFilters();
            }

            function clearSearch() {
                searchInput.value = "";
                currentSearch = "";
                applyFilters();
            }

            searchInput.addEventListener('input', applyFilters);
            categoryFilter.addEventListener('change', applyFilters);
            clearFilters.addEventListener('click', clearAllFilters);
            searchClear.addEventListener('click', clearSearch);

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    clearSearch();
                }
            });

            // Animate dropdown when it opens on click (force add .open)
            categoryFilter.addEventListener('mousedown', function() {
                categoryFilter.classList.add('open');
                setTimeout(() => categoryFilter.classList.remove('open'), 400);
            });

            // Modal rendering
            let modalOpen = false;
            function showCommandModal(cmd) {
                // Remove previous modal if present
                modalContainer.innerHTML = '';

                const argVal = cmd.arguments;
                const permVal = cmd.permissions;

                // Real command name for copying
                const cmdTextToCopy = `/${cmd.name}`;

                const modalBg = document.createElement('div');
                modalBg.className = 'command-details-modal-bg';
                modalBg.tabIndex = -1;

                const modal = document.createElement('div');
                modal.className = 'command-details-modal';

                modal.innerHTML = `
                    <button class="cmd-close-btn" title="Close (Esc)"><i class="fas fa-times"></i></button>
                    <div class="cmd-title-row">
                        <span class="cmd-title">${cmd.name}</span>
                        <button class="cmd-copy-btn" id="cmdCopyBtn" title="Copy command">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                    <div class="cmd-desc">${cmd.description}</div>
                    <div class="cmd-section">
                        <div class="cmd-label">Arguments</div>
                        <span class="cmd-value">${argVal}</span>
                    </div>
                    <div class="cmd-section">
                        <div class="cmd-label">Permissions</div>
                        <span class="cmd-value">${permVal}</span>
                    </div>
                `;
                modalBg.appendChild(modal);

                // Effects
                function doModalClose() {
                    if (!modalOpen) return;
                    modalOpen = false;
                    modalBg.remove();
                    window.removeEventListener('keydown', modalKeyHandler);
                }
                function modalKeyHandler(e) {
                    if (e.key === "Escape") {
                        doModalClose();
                    }
                }

                // Close handlers
                modal.querySelector('.cmd-close-btn').onclick = doModalClose;
                modalBg.onclick = function(e) {
                    if (e.target === modalBg) doModalClose();
                };
                window.addEventListener('keydown', modalKeyHandler);

                // Copy to clipboard
                modal.querySelector('#cmdCopyBtn').onclick = function() {
                    navigator.clipboard.writeText(cmdTextToCopy).then(() => {
                        const btn = modal.querySelector('#cmdCopyBtn');
                        btn.innerHTML = '<i class="fas fa-check"></i>';
                        btn.title = "Copied!";
                        setTimeout(() => {
                            btn.innerHTML = '<i class="fas fa-copy"></i>';
                            btn.title = "Copy command";
                        }, 1200);
                    });
                };

                modalContainer.appendChild(modalBg);
                modalOpen = true;
            }

            applyFilters();
        }

        window.addEventListener('DOMContentLoaded', initializeCommandsPage);
    </script>
</body>
</html>
