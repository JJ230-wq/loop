<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop – Status</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared.css">
    <base target="_blank">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { color: inherit; text-decoration: none; }

        /* ── Starfield ── */
        .body-starlight-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .main-stars-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .main-stars-bg canvas {
            opacity: 0.75;
            filter: blur(2px) brightness(1.17);
        }

        /* ── Loading screen ── */
        .loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.26s;
            animation: simpleFadeIn 0.6s;
        }
        .loading-mark {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            animation: fadeInUp 1s;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(35px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes simpleFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ── Nav ── */
        .site-bar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: min(1120px, calc(100% - 32px));
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 0 20px;
        }
        .site-bar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 48px;
            padding-inline: 4px;
        }
        .site-bar-brand { display: flex; align-items: center; }
        .site-bar-logo {
            width: 26px; height: 26px;
            border-radius: 8px;
            object-fit: cover;
            filter: grayscale(1) brightness(1.15);
        }
        .site-bar-nav { display: flex; align-items: center; gap: 4px; }
        .site-bar-link {
            font-size: 0.88rem;
            font-weight: 400;
            color: rgba(255,255,255,0.55);
            padding: 6px 12px;
            border-radius: 8px;
            transition: color 0.15s, background 0.15s;
            letter-spacing: 0.01em;
        }
        .site-bar-link:hover { color: #fff; background: rgba(255,255,255,0.06); }
        .site-bar-link.is-active { color: #fff; }

        /* ── Page content ── */
        .site-content {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.9s 0.15s both;
        }

        .page-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 112px 24px 64px;
            width: 100%;
        }

        /* ── Page header ── */
        .status-header {
            margin-bottom: 32px;
            animation: fadeInUp 0.8s 0.2s both;
        }
        .status-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 6px;
        }
        .status-page-title {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .status-overall-badge {
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(35,134,54,0.18);
            border: 1px solid rgba(35,134,54,0.35);
            border-radius: 20px;
            padding: 5px 12px 5px 9px;
            font-size: 13px;
            font-weight: 500;
            color: #3fb950;
        }
        .status-overall-badge.degraded {
            background: rgba(210,153,34,0.15);
            border-color: rgba(210,153,34,0.3);
            color: #e3b341;
        }
        .status-overall-badge.outage {
            background: rgba(248,81,73,0.15);
            border-color: rgba(248,81,73,0.3);
            color: #f85149;
        }
        .overall-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #3fb950;
            box-shadow: 0 0 6px #3fb950;
            animation: pulse-green 2s infinite;
        }
        .status-overall-badge.degraded .overall-dot {
            background: #e3b341;
            box-shadow: 0 0 6px #e3b341;
            animation: none;
        }
        .status-overall-badge.outage .overall-dot {
            background: #f85149;
            box-shadow: 0 0 6px #f85149;
            animation: none;
        }
        .status-subtitle {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.35);
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Refresh button ── */
        .status-refresh-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.45);
            cursor: pointer;
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
            font-family: 'Inter', sans-serif;
        }
        .status-refresh-btn:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.05);
        }
        .status-refresh-btn.spinning i { animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Shard list ── */
        .status-shards {
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fadeInUp 0.8s 0.3s both;
        }

        .status-loading {
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            padding: 48px 0;
        }
        .status-error {
            text-align: center;
            color: #f85149;
            font-size: 13px;
            padding: 48px 0;
        }

        /* ── Shard card ── */
        .shard-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 16px 18px;
            transition: border-color 0.2s, background 0.2s;
        }
        .shard-card:hover {
            border-color: rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
        }
        .shard-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .shard-card-name {
            font-size: 14px;
            font-weight: 600;
            color: #e6edf3;
        }
        .shard-card-meta {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .shard-status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(35,134,54,0.18);
            border: 1px solid rgba(35,134,54,0.35);
            border-radius: 20px;
            padding: 3px 10px 3px 7px;
            font-size: 12px;
            font-weight: 500;
            color: #3fb950;
        }
        .shard-status-badge.offline {
            background: rgba(248,81,73,0.15);
            border-color: rgba(248,81,73,0.3);
            color: #f85149;
        }
        .shard-status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #3fb950;
            box-shadow: 0 0 6px #3fb950;
            animation: pulse-green 2s infinite;
        }
        .shard-status-badge.offline .shard-status-dot {
            background: #f85149;
            box-shadow: 0 0 6px #f85149;
            animation: none;
        }
        .shard-card-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .shard-stat-label {
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 3px;
        }
        .shard-stat-value {
            font-size: 15px;
            font-weight: 600;
            color: #e6edf3;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .shard-stat-value i {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
        }

        /* ── Footer ── */
        footer {
            position: relative;
            z-index: 2;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 16px 24px 24px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
            animation: fadeInUp 0.6s 1.2s both;
        }
        .footer-inner {
            max-width: 1120px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .footer-links { display: flex; gap: 16px; }
        .footer-links a:hover { text-decoration: underline; }

        @media (max-width: 640px) {
            .site-bar { width: calc(100% - 20px); padding-inline: 10px; }
            .site-bar-nav { gap: 12px; }
            .site-bar-link { font-size: 0.85rem; padding-inline: 8px; }
            .shard-card-stats { grid-template-columns: 1fr 1fr; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="body-starlight-bg" aria-hidden="true"></div>
    <div class="main-stars-bg" id="mainStarsBg"></div>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-mark">Loading Loop</div>
    </div>

    <header class="site-bar">
        <div class="site-bar-inner">
            <div class="site-bar-brand">
                <a href="index.html" target="_self"><img src="assets/loop-logo.png" alt="Loop logo" class="site-bar-logo"></a>
            </div>
            <nav class="site-bar-nav">
                <a href="index.html" class="site-bar-link" target="_self">Home</a>
                <a href="commands.html" class="site-bar-link" id="navCommands" target="_self">Commands</a>
                <a href="status.html" class="site-bar-link is-active" target="_self">Status</a>
            </nav>
        </div>
    </header>

    <div class="site-content">
        <main class="page-container">
            <div class="status-header">
                <div class="status-header-top">
                    <h1 class="status-page-title">Bot Status</h1>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <button class="status-refresh-btn" id="refreshBtn">
                            <i class="fas fa-rotate-right"></i> Refresh
                        </button>
                        <div class="status-overall-badge" id="overallBadge">
                            <div class="overall-dot"></div>
                            All Systems Operational
                        </div>
                    </div>
                </div>
                <p class="status-subtitle" id="lastUpdated">Fetching status…</p>
            </div>

            <div class="status-shards" id="statusShards">
                <div class="status-loading">Loading…</div>
            </div>
        </main>

        <footer>
            <div class="footer-inner">
                <div>© Loop</div>
                <div class="footer-links">
                    <a href="https://discord.gg/UdFTPjhETq" target="_blank" rel="noopener noreferrer">Invite</a>
                    <a href="premium.html" target="_self">Premium</a>
                    <a href="https://discord.gg/UdFTPjhETq" target="_blank" rel="noopener noreferrer">Support</a>
                </div>
            </div>
        </footer>
    </div>

    <script src="js/shared.js"></script>
    <script>
    (function () {
        const shared = window.LoopShared;
        if (shared) {
            shared.initLoadingScreen('loadingScreen');
            shared.initMainStarfield('mainStarsBg', function () {
                return Math.floor(66 + Math.random() * 28);
            }, {
                minRadius: 0.45, radiusSpread: 1.1,
                minAlpha: 0.3, alphaSpread: 0.8,
                minBlur: 3, blurSpread: 10
            });
        }

        const shardsEl = document.getElementById('statusShards');
        const overallBadge = document.getElementById('overallBadge');
        const lastUpdated = document.getElementById('lastUpdated');
        const refreshBtn = document.getElementById('refreshBtn');

        function fetchShards() {
            return fetch('http://YOUR_IP:YOUR_PORT/status')
                .then(r => r.json());
        }

        function fmtNumber(n) {
            return n.toLocaleString('en-US');
        }

        function timeSince(ms) {
            const s = Math.floor((Date.now() - ms) / 1000);
            if (s < 60) return `${s}s ago`;
            if (s < 3600) return `${Math.floor(s/60)}m ago`;
            return `${Math.floor(s/3600)}h ago`;
        }

        function renderShards(shards) {
            const allOnline = shards.every(s => s.status === 'operational');
            const anyOnline = shards.some(s => s.status === 'operational');

            overallBadge.className = 'status-overall-badge' + (!anyOnline ? ' outage' : !allOnline ? ' degraded' : '');
            overallBadge.innerHTML = `<div class="overall-dot"></div>${allOnline ? 'All Systems Operational' : !anyOnline ? 'Major Outage' : 'Partial Outage'}`;

            const now = new Date();
            lastUpdated.textContent = `Last updated at ${now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true })}`;

            shardsEl.innerHTML = shards.map(s => {
                const online = s.status === 'operational';
                return `
                <div class="shard-card">
                    <div class="shard-card-top">
                        <div>
                            <div class="shard-card-name">Shard ${s.id}</div>
                            <div class="shard-card-meta">
                                <i class="fas fa-rotate-right"></i> just now
                            </div>
                        </div>
                        <div class="shard-status-badge ${online ? '' : 'offline'}">
                            <div class="shard-status-dot"></div>
                            ${online ? 'Operational' : 'Offline'}
                        </div>
                    </div>
                    <div class="shard-card-stats">
                        <div class="shard-stat">
                            <div class="shard-stat-label">Uptime</div>
                            <div class="shard-stat-value"><i class="fas fa-arrow-trend-up"></i>${s.uptime}</div>
                        </div>
                        <div class="shard-stat">
                            <div class="shard-stat-label">Latency</div>
                            <div class="shard-stat-value"><i class="fas fa-wifi"></i>${s.latency}ms</div>
                        </div>
                        <div class="shard-stat">
                            <div class="shard-stat-label">Servers</div>
                            <div class="shard-stat-value"><i class="fas fa-server"></i>${fmtNumber(s.servers)}</div>
                        </div>
                        <div class="shard-stat">
                            <div class="shard-stat-label">Users</div>
                            <div class="shard-stat-value"><i class="fas fa-user-group"></i>${fmtNumber(s.users)}</div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function load() {
            shardsEl.innerHTML = '<div class="status-loading">Loading…</div>';
            refreshBtn.classList.add('spinning');
            fetchShards()
                .then(renderShards)
                .catch(() => {
                    shardsEl.innerHTML = '<div class="status-error"><i class="fas fa-triangle-exclamation"></i> Failed to load status. The API may be unreachable.</div>';
                    lastUpdated.textContent = 'Could not connect to API';
                })
                .finally(() => refreshBtn.classList.remove('spinning'));
        }

        refreshBtn.addEventListener('click', load);
        load();
    })();
    </script>
</body>
</html>
