<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop – Status</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared.css">
    <base target="_blank">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { color: inherit; text-decoration: none; }

        .body-starlight-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .main-stars-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .main-stars-bg canvas {
            opacity: 0.75;
            filter: blur(2px) brightness(1.17);
        }

        .loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.26s;
            animation: simpleFadeIn 0.6s;
        }
        .loading-mark {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            animation: fadeInUp 1s;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(35px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes simpleFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .site-bar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: min(1120px, calc(100% - 32px));
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 0 20px;
        }
        .site-bar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 48px;
            padding-inline: 4px;
        }
        .site-bar-brand { display: flex; align-items: center; }
        .site-bar-logo {
            width: 26px; height: 26px;
            border-radius: 8px;
            object-fit: cover;
            filter: grayscale(1) brightness(1.15);
        }
        .site-bar-nav { display: flex; align-items: center; gap: 4px; }
        .site-bar-link {
            font-size: 0.88rem;
            font-weight: 400;
            color: rgba(255,255,255,0.55);
            padding: 6px 12px;
            border-radius: 8px;
            transition: color 0.15s, background 0.15s;
            letter-spacing: 0.01em;
        }
        .site-bar-link:hover { color: #fff; background: rgba(255,255,255,0.06); }
        .site-bar-link.is-active { color: #fff; }

        .site-content {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.9s 0.15s both;
        }

        /* Status page layout */
        .status-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 112px 24px 64px;
            gap: 32px;
            max-width: 760px;
            margin: 0 auto;
            width: 100%;
        }

        /* Overall status banner */
        .status-banner {
            width: 100%;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.07);
            background: rgba(255,255,255,0.03);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .status-banner-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #3fb950;
            box-shadow: 0 0 8px rgba(63,185,80,0.6);
            animation: pulse 2.4s ease-in-out infinite;
        }
        .status-banner-dot.error {
            background: #f85149;
            box-shadow: 0 0 8px rgba(248,81,73,0.6);
        }
        .status-banner-dot.loading {
            background: rgba(255,255,255,0.3);
            box-shadow: none;
        }
        .status-banner-text {
            font-size: 0.9rem;
            font-weight: 500;
            color: rgba(255,255,255,0.85);
        }
        .status-banner-sub {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.3);
            margin-left: auto;
            white-space: nowrap;
        }

        /* Section label */
        .section-label {
            width: 100%;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Stat grid */
        .stat-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .stat-label {
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: #e6edf3;
            letter-spacing: -0.02em;
            line-height: 1;
        }
        .stat-value.loading-val {
            height: 28px;
            border-radius: 6px;
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
            width: 60%;
        }

        /* Shard row */
        .shard-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .shard-row {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .shard-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #3fb950;
            box-shadow: 0 0 6px rgba(63,185,80,0.5);
            animation: pulse 2.4s ease-in-out infinite;
        }
        .shard-dot.error {
            background: #f85149;
            box-shadow: 0 0 6px rgba(248,81,73,0.5);
            animation: none;
        }
        .shard-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255,255,255,0.75);
        }
        .shard-meta {
            display: flex;
            gap: 20px;
            margin-left: auto;
        }
        .shard-meta-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }
        .shard-meta-val {
            font-size: 0.82rem;
            font-weight: 500;
            color: rgba(255,255,255,0.75);
        }
        .shard-meta-key {
            font-size: 0.68rem;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Latency color */
        .latency-good { color: #3fb950; }
        .latency-ok { color: #d29922; }
        .latency-bad { color: #f85149; }

        /* Refresh row */
        .refresh-row {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .refresh-note {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.2);
        }
        .refresh-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.78rem;
            font-family: inherit;
            color: rgba(255,255,255,0.45);
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .refresh-btn:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.04);
        }

        footer {
            position: relative;
            z-index: 2;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 16px 24px 24px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }
        .footer-inner {
            max-width: 1120px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .footer-links { display: flex; gap: 16px; }
        .footer-links a:hover { text-decoration: underline; }

        @media (max-width: 640px) {
            .site-bar { width: calc(100% - 20px); padding-inline: 10px; }
            .site-bar-nav { gap: 4px; }
            .site-bar-link { font-size: 0.8rem; padding: 5px 8px; }
            .shard-meta { gap: 12px; }
            .status-banner-sub { display: none; }
        }
    </style>
</head>
<body>
    <div class="body-starlight-bg" aria-hidden="true"></div>
    <div class="main-stars-bg" id="mainStarsBg"></div>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-mark">Loading Loop</div>
    </div>

    <header class="site-bar">
        <div class="site-bar-inner">
            <div class="site-bar-brand">
                <a href="index.html" target="_self"><img src="assets/loop-logo.png" alt="Loop logo" class="site-bar-logo"></a>
            </div>
            <nav class="site-bar-nav">
                <a href="commands.html" class="site-bar-link" target="_self">Commands</a>
                <a class="site-bar-link" style="opacity:0.35;cursor:not-allowed;pointer-events:none;">Status <span style="font-size:0.65rem;letter-spacing:0.08em;color:rgba(255,255,255,0.3);">SOON</span></a>
                <a href="docs.html" class="site-bar-link" target="_self">Docs</a>
                <a href="faq.html" class="site-bar-link" target="_self">FAQ</a>
            </nav>
        </div>
    </header>

    <div class="site-content">
        <div class="status-wrap">

            <!-- Overall banner -->
            <div class="status-banner" id="statusBanner">
                <div class="status-banner-dot loading" id="bannerDot"></div>
                <span class="status-banner-text" id="bannerText">Checking status…</span>
                <span class="status-banner-sub" id="bannerSub"></span>
            </div>

            <!-- Stats -->
            <div style="width:100%;display:flex;flex-direction:column;gap:10px;">
                <div class="section-label">Overview</div>
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="stat-label">Uptime</div>
                        <div class="stat-value" id="statUptime"><div class="loading-val"></div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Latency</div>
                        <div class="stat-value" id="statLatency"><div class="loading-val"></div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Servers</div>
                        <div class="stat-value" id="statServers"><div class="loading-val"></div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Users</div>
                        <div class="stat-value" id="statUsers"><div class="loading-val"></div></div>
                    </div>
                </div>
            </div>

            <!-- Shards -->
            <div class="shard-section" id="shardSection">
                <div class="section-label">Shards</div>
                <div id="shardList">
                    <!-- populated by JS -->
                    <div class="shard-row">
                        <div class="shard-dot" style="background:rgba(255,255,255,0.15);box-shadow:none;animation:none;"></div>
                        <span class="shard-name" style="color:rgba(255,255,255,0.25);">Loading…</span>
                    </div>
                </div>
            </div>

            <!-- Refresh -->
            <div class="refresh-row">
                <span class="refresh-note" id="lastChecked">—</span>
                <button class="refresh-btn" id="refreshBtn">
                    <i class="fas fa-rotate-right" style="font-size:0.72rem;"></i> Refresh
                </button>
            </div>

        </div>

        <footer>
            <div class="footer-inner">
                <div>© Loop</div>
                <div class="footer-links">
                    <a href="https://discord.gg/hHWEurhSHA" target="_blank" rel="noopener noreferrer">Invite</a>
                    <a href="premium.html" target="_self">Premium</a>
                    <a href="https://discord.gg/UdFTPjhETq" target="_blank" rel="noopener noreferrer">Support</a>
                </div>
            </div>
        </footer>
    </div>

    <script src="js/shared.js"></script>
    <script>
    (function () {
        const shared = window.LoopShared;
        if (shared) {
            shared.initLoadingScreen('loadingScreen');
            shared.initMainStarfield('mainStarsBg', function () {
                return Math.floor(66 + Math.random() * 28);
            }, {
                minRadius: 0.45, radiusSpread: 1.1,
                minAlpha: 0.3, alphaSpread: 0.8,
                minBlur: 3, blurSpread: 10
            });
        }
    })();

    // ── Config ────────────────────────────────────────────────────────────────
    const API_URL = 'https://corsproxy.io/?url=http://51.222.117.195:25603/status'; // adjust if needed
    const REFRESH_MS = 60000; // auto-refresh every 60s

    // ── Helpers ───────────────────────────────────────────────────────────────
    function latencyClass(ms) {
        if (ms < 100) return 'latency-good';
        if (ms < 250) return 'latency-ok';
        return 'latency-bad';
    }

    function formatNum(n) {
        if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
        return String(n);
    }

    function timeNow() {
        return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render(data) {
        // data is the array from your API, each item: { id, status, uptime, latency, servers, users }
        const allOk = data.every(s => s.status === 'operational');

        // Banner
        const dot = document.getElementById('bannerDot');
        const text = document.getElementById('bannerText');
        const sub = document.getElementById('bannerSub');

        dot.className = 'status-banner-dot' + (allOk ? '' : ' error');
        text.textContent = allOk ? 'All systems operational' : 'Degraded performance detected';
        sub.textContent = 'Last checked ' + timeNow();

        // Aggregate stats (sum across shards)
        const totalServers = data.reduce((a, s) => a + (s.servers || 0), 0);
        const totalUsers   = data.reduce((a, s) => a + (s.users   || 0), 0);
        const avgLatency   = Math.round(data.reduce((a, s) => a + (s.latency || 0), 0) / data.length);
        // Use first shard's uptime (they share the same process if no sharding)
        const uptime = data[0]?.uptime || '—';

        document.getElementById('statUptime').textContent  = uptime;
        const latEl = document.getElementById('statLatency');
        latEl.textContent = avgLatency + 'ms';
        latEl.className = 'stat-value ' + latencyClass(avgLatency);
        document.getElementById('statServers').textContent = formatNum(totalServers);
        document.getElementById('statUsers').textContent   = formatNum(totalUsers);

        // Shard rows
        const list = document.getElementById('shardList');
        list.innerHTML = '';

        data.forEach(shard => {
            const ok = shard.status === 'operational';
            const row = document.createElement('div');
            row.className = 'shard-row';

            const latClass = latencyClass(shard.latency || 0);

            row.innerHTML = `
                <div class="shard-dot${ok ? '' : ' error'}"></div>
                <span class="shard-name">Shard ${shard.id}</span>
                <div class="shard-meta">
                    <div class="shard-meta-item">
                        <span class="shard-meta-val ${latClass}">${shard.latency ?? '—'}ms</span>
                        <span class="shard-meta-key">Latency</span>
                    </div>
                    <div class="shard-meta-item">
                        <span class="shard-meta-val">${formatNum(shard.servers ?? 0)}</span>
                        <span class="shard-meta-key">Servers</span>
                    </div>
                    <div class="shard-meta-item">
                        <span class="shard-meta-val">${shard.uptime ?? '—'}</span>
                        <span class="shard-meta-key">Uptime</span>
                    </div>
                </div>
            `;
            list.appendChild(row);
        });

        document.getElementById('lastChecked').textContent = 'Updated ' + timeNow();
    }

    function renderError() {
        const dot  = document.getElementById('bannerDot');
        const text = document.getElementById('bannerText');
        const sub  = document.getElementById('bannerSub');

        dot.className  = 'status-banner-dot error';
        text.textContent = 'Unable to reach status API';
        sub.textContent  = 'Last tried ' + timeNow();

        ['statUptime','statLatency','statServers','statUsers'].forEach(id => {
            document.getElementById(id).textContent = '—';
        });

        document.getElementById('shardList').innerHTML = `
            <div class="shard-row">
                <div class="shard-dot error"></div>
                <span class="shard-name" style="color:rgba(255,255,255,0.45);">API unreachable</span>
            </div>
        `;
        document.getElementById('lastChecked').textContent = 'Failed at ' + timeNow();
    }

    // ── Fetch ─────────────────────────────────────────────────────────────────
    async function fetchStatus() {
        try {
            const res = await fetch(API_URL, { signal: AbortSignal.timeout(8000) });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            render(Array.isArray(data) ? data : [data]);
        } catch (e) {
            console.warn('Status fetch failed:', e);
            renderError();
        }
    }

    fetchStatus();
    setInterval(fetchStatus, REFRESH_MS);
    document.getElementById('refreshBtn').addEventListener('click', fetchStatus);
    </script>
</body>
</html>
